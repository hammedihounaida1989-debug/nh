<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نجم الدين همادي - التعليم هو مفتاح المستقبل</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@400;700;900&display=swap" rel="stylesheet">

<style>
*{
font-family:'Noto Naskh Arabic',serif;
box-sizing:border-box;
}

body{
background:linear-gradient(135deg,#f0fdf4,#eff6ff,#ffffff);
min-height:100vh;
}

.card-hover{
transition:0.3s;
}

.card-hover:hover{
transform:translateY(-5px);
box-shadow:0 15px 30px rgba(0,0,0,0.08);
}
</style>
</head>
<body>

<div class="min-h-screen grid lg:grid-cols-[300px_1fr]">

<aside class="bg-yellow-50 border-l p-6">

<div class="text-center mb-10">

<div id="sidebar-logo" class="w-32 h-32 mx-auto bg-white rounded-[30px] shadow-xl overflow-hidden flex items-center justify-center text-6xl">
⭐
</div>

<label class="mt-5 inline-block bg-blue-600 hover:bg-blue-700 text-white px-5 py-3 rounded-2xl cursor-pointer font-bold">
تغيير الشعار
<input type="file" id="logo-input" accept="image/*" class="hidden">
</label>

<h1 class="text-3xl font-black text-blue-900 mt-6">
نجم الدين همادي
</h1>

<p class="text-yellow-600 font-bold mt-2">
التعليم هو مفتاح المستقبل
</p>

</div>

<div class="space-y-3">
<button onclick="showHome()" class="w-full bg-blue-100 text-blue-700 py-4 rounded-2xl font-bold">
الرئيسية
</button>

<button onclick="showSubjects()" class="w-full bg-green-100 text-green-700 py-4 rounded-2xl font-bold">
المواد
</button>
</div>

</aside>

<main class="p-6 md:p-10">

<div id="home-page" class="text-center py-10">

<div id="main-logo" class="w-[350px] h-[350px] mx-auto bg-white rounded-[40px] shadow-2xl border-8 border-blue-100 overflow-hidden flex items-center justify-center text-[180px]">
⭐
</div>

<h1 class="text-5xl font-black text-blue-900 mt-8">
نجم الدين همادي
</h1>

<p class="text-2xl text-yellow-600 font-black mt-3">
التعليم هو مفتاح المستقبل
</p>

</div>

<div id="subjects-page" class="hidden">

<h2 class="text-5xl font-black text-green-700 text-center mb-10">
السنة الخامسة
</h2>

<div class="grid md:grid-cols-2 xl:grid-cols-3 gap-8">

<div class="card-hover bg-white rounded-[30px] p-7 border shadow-sm">
<h3 class="text-3xl font-black text-blue-900 mb-5">الرياضيات</h3>

<div class="space-y-4">

<div class="bg-blue-50 rounded-2xl p-4">
<div class="flex justify-between items-center mb-3">
<h4 class="font-black text-blue-700">📘 الدروس</h4>
<button class="upload-btn bg-blue-600 text-white px-4 py-2 rounded-xl text-sm font-bold">رفع</button>
</div>
<div class="files-list"></div>
</div>

<div class="bg-yellow-50 rounded-2xl p-4">
<div class="flex justify-between items-center mb-3">
<h4 class="font-black text-yellow-700">📝 التمارين</h4>
<button class="upload-btn bg-yellow-600 text-white px-4 py-2 rounded-xl text-sm font-bold">رفع</button>
</div>
<div class="files-list"></div>
</div>

<div class="bg-red-50 rounded-2xl p-4">
<div class="flex justify-between items-center mb-3">
<h4 class="font-black text-red-700">📄 الاختبارات</h4>
<button class="upload-btn bg-red-600 text-white px-4 py-2 rounded-xl text-sm font-bold">رفع</button>
</div>
<div class="files-list"></div>
</div>

</div>
</div>

</div>
</div>

</main>
</div>

<script>
function showHome(){
document.getElementById('home-page').classList.remove('hidden');
document.getElementById('subjects-page').classList.add('hidden');
}

function showSubjects(){
document.getElementById('home-page').classList.add('hidden');
document.getElementById('subjects-page').classList.remove('hidden');
}
</script>

<script type="module">

import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const SUPABASE_URL = 'https://orrmwdjebfawekocbjrx.supabase.co';

const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9ycm13ZGplYmZhd2Vrb3FianJ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkyODYzMzAsImV4cCI6MjA5NDg2MjMzMH0.lfDwqOc0Zs6bP_bAKAI3QZs9QU5M1g3dZ4E8ljJemHI';

const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

const sidebarLogo = document.getElementById('sidebar-logo');
const mainLogo = document.getElementById('main-logo');
const logoInput = document.getElementById('logo-input');

/* رفع الشعار */

async function uploadLogo(file){

const fileExt = file.name.split('.').pop();
const filePath = `logos/logo-${Date.now()}.${fileExt}`;

const { error } = await supabase.storage
.from('school-files')
.upload(filePath, file, {
cacheControl:'3600',
upsert:true,
contentType:file.type
});

if(error){
console.log(error);
alert('فشل رفع الشعار : ' + error.message);
return;
}

const { data } = supabase.storage
.from('school-files')
.getPublicUrl(filePath);

sidebarLogo.innerHTML = `
<img src="${data.publicUrl}" class="w-full h-full object-cover">
`;

mainLogo.innerHTML = `
<img src="${data.publicUrl}" class="w-full h-full object-cover">
`;

localStorage.setItem('platformLogo', data.publicUrl);

alert('تم رفع الشعار بنجاح');
}

function loadLogo(){

const savedLogo = localStorage.getItem('platformLogo');

if(savedLogo){
sidebarLogo.innerHTML = `
<img src="${savedLogo}" class="w-full h-full object-cover">
`;

mainLogo.innerHTML = `
<img src="${savedLogo}" class="w-full h-full object-cover">
`;
}
}

logoInput.addEventListener('change', async (e)=>{

try{

const file = e.target.files[0];

if(!file) return;

await uploadLogo(file);

}catch(err){
alert(err.message);
}

});

/* رفع الملفات */

window.attachUploadEvents = function(){

const buttons = document.querySelectorAll('.upload-btn');

buttons.forEach((button)=>{

button.addEventListener('click',()=>{

const input = document.createElement('input');
input.type = 'file';

input.addEventListener('change', async(e)=>{

try{

const file = e.target.files[0];
if(!file) return;

const filePath = `files/${Date.now()}-${file.name}`;

const { error } = await supabase.storage
.from('school-files')
.upload(filePath, file, {
upsert:true,
contentType:file.type
});

if(error){
console.log(error);
alert(error.message);
return;
}

alert('تم رفع الملف بنجاح');

input.value='';

renderFiles();

}catch(err){
alert(err.message);
}

});

input.click();

});

});
}

/* عرض الملفات */

async function renderFiles(){

const lists = document.querySelectorAll('.files-list');
lists.forEach(list => list.innerHTML='');

const { data, error } = await supabase.storage
.from('school-files')
.list('files', { limit:100 });

if(error){
console.log(error);
return;
}

lists.forEach((list)=>{

data.forEach((file)=>{

const fileUrl = `${SUPABASE_URL}/storage/v1/object/public/school-files/files/${file.name}`;

const item = document.createElement('div');

item.className = 'bg-white rounded-xl border p-3 mt-2 flex justify-between items-center';

item.innerHTML = `
<p class="font-bold text-blue-700 overflow-hidden text-ellipsis whitespace-nowrap">
${file.name}
</p>

<button class="open-btn bg-green-600 text-white px-3 py-2 rounded-xl text-sm font-bold">
فتح
</button>
`;

item.querySelector('.open-btn').addEventListener('click',()=>{
window.open(fileUrl,'_blank');
});

list.appendChild(item);

});

});

}

loadLogo();
attachUploadEvents();
renderFiles();

</script>

</body>
</html>
