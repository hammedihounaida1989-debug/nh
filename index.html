<style>
*{
font-family:'Noto Naskh Arabic',serif;
box-sizing:border-box;
}

body{
min-height:100vh;
background:
radial-gradient(circle at top right, rgba(59,130,246,0.18), transparent 25%),
radial-gradient(circle at bottom left, rgba(234,179,8,0.18), transparent 30%),
linear-gradient(135deg,#f0fdf4 0%,#eff6ff 40%,#ffffff 100%);
background-attachment:fixed;
overflow-x:hidden;
}

.glass{
background:rgba(255,255,255,0.75);
backdrop-filter:blur(18px);
}

.card-hover{
transition:0.3s;
}

.card-hover:hover{
transform:translateY(-5px);
box-shadow:0 15px 30px rgba(0,0,0,0.08);
}

.active-level{
background:#bbf7d0;
color:#166534;
border:2px solid #86efac;
}

.sidebar-link:hover{
background:#fff7d6;
color:#b7791f;
}

.modal-bg{
background:rgba(0,0,0,0.5);
backdrop-filter:blur(5px);
}

</head>

<body>

<div id="login-page" class="fixed inset-0 flex items-center justify-center bg-gradient-to-br from-blue-100 to-yellow-50 z-50 p-4">

<div class="bg-white w-full max-w-md rounded-[35px] p-8 shadow-2xl">

<h1 class="text-4xl font-black text-center text-blue-900 mb-3">
تسجيل دخول المدير
</h1>

<p class="text-center text-slate-500 mb-8">
التعليم هو مفتاح المستقبل
</p>

<input id="admin-username" type="text" placeholder="اسم المستخدم" class="w-full border-2 border-slate-200 rounded-2xl px-5 py-4 mb-4">

<input id="admin-password" type="password" placeholder="كلمة المرور" class="w-full border-2 border-slate-200 rounded-2xl px-5 py-4 mb-6">

<button id="login-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-black">
دخول المدير
</button>

<p id="login-error" class="hidden text-red-500 text-center mt-4 font-bold">
معلومات الدخول غير صحيحة
</p>

<div class="mt-8 border-t pt-6">

<h2 class="text-2xl font-black text-green-700 text-center mb-4">
دخول التلاميذ
</h2>

<input id="student-name" type="text" placeholder="اسم التلميذ" class="w-full border-2 border-slate-200 rounded-2xl px-5 py-4 mb-4">

<input id="student-password" type="password" placeholder="كلمة المرور" class="w-full border-2 border-slate-200 rounded-2xl px-5 py-4 mb-4">

<button id="student-login-btn" class="w-full bg-green-600 hover:bg-green-700 text-white py-4 rounded-2xl font-black">
دخول التلميذ
</button>

</div>
</div>
</div>

<div id="download-login-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center modal-bg p-4">

<div class="bg-white w-full max-w-md rounded-[35px] p-8 shadow-2xl">

<h2 class="text-3xl font-black text-center text-blue-900 mb-4">
تأكيد التحميل
</h2>

<input id="download-student-name" type="text" placeholder="اسم التلميذ" class="w-full border-2 border-slate-200 rounded-2xl px-5 py-4 mb-4">

<input id="download-student-password" type="password" placeholder="كلمة المرور" class="w-full border-2 border-slate-200 rounded-2xl px-5 py-4 mb-4">

<button id="download-login-btn" class="w-full bg-green-600 hover:bg-green-700 text-white py-4 rounded-2xl font-black">
تحميل الملف
</button>

</div>
</div>

<div id="platform" class="hidden min-h-screen glass">
<div class="grid lg:grid-cols-[320px_1fr] min-h-screen">

<aside class="bg-yellow-50 border-l border-yellow-100 p-6">

<div class="text-center mb-10">

<div id="sidebar-logo" class="w-32 h-32 mx-auto rounded-[30px] bg-white flex items-center justify-center shadow-xl overflow-hidden text-7xl">
⭐
</div>

تغيير الشعار

<h1 class="text-3xl font-extrabold text-blue-900 mt-5">
نجم الدين همادي
</h1>

<p class="text-slate-500 mt-2">
التعليم هو مفتاح المستقبل
</p>
</div>

<nav class="space-y-3">

<a href="#" id="home-btn" class="sidebar-link flex items-center justify-between bg-blue-50 text-blue-700 px-5 py-4 rounded-2xl font-bold">
<span>الرئيسية</span>
<span>🏠</span>

<main class="p-6 md:p-10">

<div id="home-page" class="flex flex-col items-center justify-center text-center py-10">

<div id="main-logo" class="w-[350px] md:w-[500px] bg-white rounded-[40px] shadow-2xl border-8 border-blue-100 overflow-hidden p-10 flex items-center justify-center mb-8">

</button>

</div>

<div id="levels-list" class="flex gap-3 overflow-x-auto pb-3 mb-8">

<button class="level-btn active-level px-7 py-3 rounded-full font-bold border-2 border-green-200">السنة الأولى</button>
<button class="level-btn bg-green-50 border border-green-200 px-7 py-3 rounded-full font-bold text-green-700">السنة الثانية</button>
<button class="level-btn bg-green-50 border border-green-200 px-7 py-3 rounded-full font-bold text-green-700">السنة الثالثة</button>
<button class="level-btn bg-green-50 border border-green-200 px-7 py-3 rounded-full font-bold text-green-700">السنة الرابعة</button>
<button class="level-btn bg-green-50 border border-green-200 px-7 py-3 rounded-full font-bold text-green-700">السنة الخامسة</button>
<button class="level-btn bg-green-50 border border-green-200 px-7 py-3 rounded-full font-bold text-green-700">السنة السادسة</button>

</div>
</div>
</main>
</div>
</div>

<script>

const ADMIN_USERNAME = "admin";
const ADMIN_PASSWORD = "123456";

let currentDownloadLink = null;
let isStudent = false;

const students = [
{name:"ahmed",password:"123"},
{name:"sara",password:"456"},
{name:"mohamed",password:"789"}
];

const homePage = document.getElementById('home-page');
const subjectsPage = document.getElementById('subjects-page');
const logoInput = document.getElementById('logo-input');
const sidebarLogo = document.getElementById('sidebar-logo');
const mainLogo = document.getElementById('main-logo');

const subjectsByLevel = {
'السنة الأولى':['الرياضيات','اللغة العربية','الإيقاظ العلمي'],
'السنة الثانية':['الرياضيات','اللغة العربية','الإيقاظ العلمي'],
'السنة الثالثة':['الرياضيات','اللغة العربية','الفرنسية'],
'السنة الرابعة':['الرياضيات','اللغة العربية','الفرنسية'],
'السنة الخامسة':['الرياضيات','اللغة العربية','الفرنسية'],
'السنة السادسة':['الرياضيات','اللغة العربية','الفرنسية']
};

function createFolder(title,color){
return `
<div class="folder-box bg-${color}-50 rounded-2xl p-4">
<div class="flex justify-between items-center mb-3">
<h4 class="font-black text-${color}-700">${title}</h4>
<button class="upload-btn bg-${color}-600 text-white px-4 py-2 rounded-xl text-sm font-bold">رفع</button>
</div>
<div class="files-list space-y-2"></div>
</div>
`;
}

function createSubjectCard(subjectName){
return `
<div class="card-hover bg-white rounded-[30px] p-7 border border-slate-100 shadow-sm">
<h3 class="text-3xl font-black text-blue-900 mb-5">${subjectName}</h3>
<div class="grid gap-4">
${createFolder('📘 الدروس','blue')}
${createFolder('📝 التمارين','yellow')}
${createFolder('📄 الاختبارات','red')}
</div>
</div>
`;
}

document.getElementById('login-btn').addEventListener('click',()=>{

const username = document.getElementById('admin-username').value;
const password = document.getElementById('admin-password').value;

if(username === ADMIN_USERNAME && password === ADMIN_PASSWORD){

document.getElementById('login-page').classList.add('hidden');
document.getElementById('platform').classList.remove('hidden');

}else{
document.getElementById('login-error').classList.remove('hidden');
}
});

document.getElementById('student-login-btn').addEventListener('click',()=>{

const studentName = document.getElementById('student-name').value.trim();
const studentPassword = document.getElementById('student-password').value.trim();

const foundStudent = students.find(student =>
student.name === studentName && student.password === studentPassword
);

if(foundStudent){
isStudent = true;
document.getElementById('login-page').classList.add('hidden');
document.getElementById('platform').classList.remove('hidden');
}
});

document.getElementById('home-btn').addEventListener('click',(e)=>{
e.preventDefault();
homePage.classList.remove('hidden');
subjectsPage.classList.add('hidden');
});

document.getElementById('toggle-subjects').addEventListener('click',(e)=>{
e.preventDefault();
homePage.classList.add('hidden');
subjectsPage.classList.remove('hidden');
});

const levelPage = document.getElementById('level-page');
const levelsList = document.getElementById('levels-list');
const levelTitle = document.getElementById('level-title');
const levelSubjectsContainer = document.getElementById('level-subjects-container');

function renderSubjects(levelName){

levelPage.classList.remove('hidden');
levelsList.classList.add('hidden');

levelTitle.textContent = levelName;
levelSubjectsContainer.innerHTML='';

subjectsByLevel[levelName].forEach(subject=>{
levelSubjectsContainer.innerHTML += createSubjectCard(subject);
});

attachUploadEvents();
renderSavedFiles();
}

document.querySelectorAll('.level-btn').forEach((btn)=>{
btn.addEventListener('click',()=>{
renderSubjects(btn.textContent.trim());
});
});

document.getElementById('back-to-levels').addEventListener('click',()=>{
levelPage.classList.add('hidden');
levelsList.classList.remove('hidden');
});

</script>
